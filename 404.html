<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: #0b141a;
      color: #e9edef;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .error-code {
      font-size: 12rem;
      line-height: 1;
      font-weight: 900;
      background: linear-gradient(135deg, #3b82f6, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-6">
  <div class="text-center max-w-lg mx-auto">
    
    <!-- Big 404 -->
    <div class="error-code mb-4">404</div>
    
    <h1 class="text-4xl font-bold mb-3">Oops! Page Not Found</h1>
    
    <p class="text-gray-400 text-lg mb-10">
      The page you're looking for doesn't exist or has been moved.
    </p>

    <!-- Fun illustration -->
    <div class="mb-12">
      <i class="fa-solid fa-face-sad-tear text-8xl text-purple-400"></i>
    </div>

    <div class="space-y-4">
      <a href="/" 
         class="block w-full bg-blue-600 hover:bg-blue-700 transition-colors py-4 rounded-3xl font-semibold text-lg">
        ← Back to Home
      </a>
      
      <a href="/chat" 
         class="block w-full bg-gray-800 hover:bg-gray-700 transition-colors py-4 rounded-3xl font-semibold text-lg">
        Go to Chat
      </a>
      
      
    </div>

    <p class="text-gray-500 text-sm mt-12">
      Still lost? Contact support or try refreshing the page.
    </p>
  </div>
</body>
</html>
